name: Daily KPI Pipeline

on:
  schedule:
    # 10:00 AM Bangladesh time = 04:00 UTC
    - cron: '0 4 * * *'
    # Backups: 04:30 and 05:00 UTC in case GitHub delays the first
    - cron: '30 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Restore Google credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "ERROR: GOOGLE_CREDS_JSON empty"
            exit 1
          fi
          echo "$CREDS" > google_creds.json

      - name: Restore Stripe cookies
        env:
          COOKIES: ${{ secrets.STRIPE_COOKIES_JSON }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > stripe_cookies.json
          fi

      - name: Run pipeline
        env:
          HEADLESS_MODE: "true"
        run: python daily_pipeline.py

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kpi-data-${{ github.run_number }}-${{ github.run_attempt }}
          path: |
            data_output/*.csv
            data_output/*.json
          retention-days: 90

      - name: Print data summary
        if: always()
        run: |
          echo "=== DATA OUTPUT FILES ==="
          ls -lah data_output/ 2>/dev/null || echo "No data_output directory yet"
          echo ""
          echo "=== ROW COUNTS ==="
          for f in data_output/*.csv; do
            if [ -f "$f" ]; then
              rows=$(tail -n +2 "$f" | wc -l)
              echo "  $f: $rows rows"
            fi
          done
          echo ""
          echo "=== GOOGLE SHEETS STATUS ==="
          grep -r "AVAILABLE\|unavailable\|STORAGE FULL\|fallback" data_output/run_summaries.json 2>/dev/null | tail -5 || echo "No run summary yet"

