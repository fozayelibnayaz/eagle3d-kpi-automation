name: Daily KPI Pipeline

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '30 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      force_historical:
        description: 'Force "Last 6 Month" historical scrape'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright
        run: playwright install --with-deps chromium

      - name: Restore Google credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "ERROR: GOOGLE_CREDS_JSON empty"; exit 1
          fi
          echo "$CREDS" > google_creds.json

      - name: Get KPI session
        env:
          KPI_EMAIL: ${{ secrets.KPI_EMAIL }}
          KPI_PASSWORD: ${{ secrets.KPI_PASSWORD }}
        run: |
          python3 firebase_login.py || true
          python3 -c "
import json, os
from pathlib import Path
ss = Path('kpi_storage_state.json')
if ss.exists():
    print(f'Storage state: {ss.stat().st_size} bytes')
"

      - name: Restore Stripe cookies
        env:
          COOKIES: ${{ secrets.STRIPE_COOKIES_JSON }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > stripe_cookies.json
            echo "stripe_cookies.json: $(wc -c < stripe_cookies.json) bytes"
          fi

      - name: Run pipeline
        env:
          MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          HEADLESS_MODE: "true"
          FORCE_HISTORICAL: ${{ github.event.inputs.force_historical == 'true' && '1' || '' }}
        run: python daily_pipeline.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kpi-data-${{ github.run_number }}
          path: |
            data_output/*.csv
            data_output/*.json
            data_output/*.png
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          echo "=== DATA OUTPUT ==="
          ls -lah data_output/ 2>/dev/null || echo "empty"
