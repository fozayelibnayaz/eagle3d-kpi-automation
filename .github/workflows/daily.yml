name: Daily KPI Pipeline

on:
  schedule:
    # 10:00 AM Bangladesh time = 04:00 UTC
    - cron: '0 4 * * *'
    # Backups: 04:30 and 05:00 UTC in case GitHub delays the first
    - cron: '30 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Restore Google credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "ERROR: GOOGLE_CREDS_JSON empty"
            exit 1
          fi
          echo "$CREDS" > google_creds.json

      - name: Restore Stripe cookies
        env:
          COOKIES: ${{ secrets.STRIPE_COOKIES_JSON }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > stripe_cookies.json
          fi

      - name: Run pipeline
        env:
          HEADLESS_MODE: "true"
        run: python daily_pipeline.py
