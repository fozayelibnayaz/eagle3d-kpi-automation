name: Daily KPI Pipeline

on:
  schedule:
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Show repo contents
        run: |
          pwd
          ls -la
          echo "--- Python files ---"
          ls -la *.py
          echo "--- Requirements ---"
          ls -la requirements*.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Restore Google credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "ERROR: GOOGLE_CREDS_JSON is empty"
            exit 1
          fi
          echo "$CREDS" > google_creds.json
          echo "google_creds.json size: $(wc -c < google_creds.json) bytes"

      - name: Restore Stripe cookies
        env:
          COOKIES: ${{ secrets.STRIPE_COOKIES_JSON }}
        run: |
          if [ -z "$COOKIES" ]; then
            echo "WARNING: STRIPE_COOKIES_JSON empty, Stripe will be skipped"
          else
            echo "$COOKIES" > stripe_cookies.json
            echo "stripe_cookies.json size: $(wc -c < stripe_cookies.json) bytes"
          fi

      - name: Run pipeline
        env:
          HEADLESS_MODE: "true"
        run: python daily_pipeline.py
