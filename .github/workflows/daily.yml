name: Daily KPI Pipeline

on:
  schedule:
    - cron: '0 4 * * *'
    - cron: '30 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Restore Google credentials
        env:
          CREDS: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: |
          if [ -z "$CREDS" ]; then
            echo "ERROR: GOOGLE_CREDS_JSON empty"
            exit 1
          fi
          echo "$CREDS" > google_creds.json
          echo "google_creds.json ready"

      - name: Get KPI session token
        env:
          KPI_EMAIL: ${{ secrets.KPI_EMAIL }}
          KPI_PASSWORD: ${{ secrets.KPI_PASSWORD }}
        run: |
          python3 firebase_login.py
          python3 -c "
import json, sys
from pathlib import Path
p = Path('kpi_cookies.json')
if not p.exists() or p.stat().st_size < 10:
    print('ERROR: kpi_cookies.json missing or empty')
    sys.exit(1)
d = json.load(open(p))
if not d:
    print('ERROR: No cookies')
    sys.exit(1)
print(f'KPI token ready: {len(d)} cookie(s), {p.stat().st_size} bytes')
"

      - name: Restore Stripe cookies
        env:
          COOKIES: ${{ secrets.STRIPE_COOKIES_JSON }}
        run: |
          if [ -n "$COOKIES" ]; then
            echo "$COOKIES" > stripe_cookies.json
            echo "Stripe cookies ready"
          else
            echo "No Stripe cookies - Stripe stage will be skipped"
          fi

      - name: Run pipeline
        env:
          MASTER_SHEET_URL: ${{ secrets.MASTER_SHEET_URL }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
          HEADLESS_MODE: "true"
        run: python daily_pipeline.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kpi-data-${{ github.run_number }}
          path: |
            data_output/*.csv
            data_output/*.json
            data_output/*.png
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          echo "=== DATA OUTPUT ==="
          ls -lah data_output/ 2>/dev/null || echo "empty"
          echo "=== ROW COUNTS ==="
          for f in data_output/*.csv; do
            [ -f "$f" ] && echo "  $f: $(tail -n +2 $f | wc -l) rows"
          done
