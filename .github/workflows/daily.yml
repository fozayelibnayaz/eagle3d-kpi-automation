name: Daily KPI Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements-pipeline.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Restore Google credentials
        run: |
          echo '${{ secrets.GOOGLE_CREDS_JSON }}' > google_creds.json

      - name: Restore Stripe cookies
        run: |
          echo '${{ secrets.STRIPE_COOKIES_JSON }}' > stripe_cookies.json

      - name: Run pipeline (headless)
        env:
          HEADLESS_MODE: "true"
        run: |
          python daily_pipeline.py
